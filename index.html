<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal E-Commerce Store</title>
    <!-- Font Awesome Icons Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Navbar Section -->
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo"><i class="fa-solid fa-bag-shopping"></i> QuickShop</h1>
            <div class="cart-icon-wrapper" id="cart-icon-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-badge" class="badge">0</span>
            </div>
        </div>
    </header>

    <!-- Main Storefront Section -->
    <main class="store-container">
        <h2 class="main-heading">Our Featured Products</h2>
        <div class="products-grid" id="products-grid-container">
            <!-- Products will be generated dynamically via JavaScript -->
        </div>
    </main>

    <!-- Slide-out Shopping Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <i class="fa-solid fa-xmark close-cart-btn" id="close-cart-btn"></i>
        </div>
        
        <!-- Cart Items List Container -->
        <div class="cart-body" id="cart-items-container">
            <!-- Dynamic Cart Row items go here -->
            <p class="empty-message">Your cart is currently empty.</p>
        </div>

        <!-- Cart Summary Footer -->
        <div class="cart-footer">
            <div class="total-row">
                <span>Grand Total:</span>
                <span id="cart-total-price">₹0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-action-btn">Proceed to Checkout</button>
        </div>
    </div>
    
    <!-- Transparent Background Overlay when Cart is open -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
