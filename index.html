<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog Platform</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo"><i class="fa-solid fa-pen-nib"></i> DevSpace</h1>
            <span class="nav-tagline">Share Your Thoughts</span>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="main-container">
        
        <!-- Left Side: Create New Post Form -->
        <section class="form-section">
            <div class="card">
                <h2><i class="fa-solid fa-plus-circle"></i> Create New Post</h2>
                <form id="blog-form">
                    <div class="form-group">
                        <label for="post-title">Post Title</label>
                        <input type="text" id="post-title" placeholder="Enter an engaging title..." required>
                    </div>
                    <div class="form-group">
                        <label for="post-category">Category</label>
                        <select id="post-category">
                            <option value="Technology">Technology</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Coding">Coding</option>
                            <option value="Education">Education</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="post-content">Content</label>
                        <textarea id="post-content" rows="8" placeholder="Write your story here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Publish Post</button>
                </form>
            </div>
        </section>

        <!-- Right Side: Dynamic Blog Feed -->
        <section class="feed-section">
            <h2><i class="fa-solid fa-newspaper"></i> Recent Articles</h2>
            <div id="blog-feed" class="blog-feed">
                <!-- JavaScript will insert blog cards dynamically here -->
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
