<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager</title>
    <!-- Font Awesome for clean Delete/Check Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <h2><i class="fa-solid fa-list-check"></i> Task Manager</h2>
        
        <!-- Input Section -->
        <div class="todo-input-box">
            <input type="text" id="todo-input" placeholder="Add a new task here..." maxlength="60">
            <button id="add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>

        <!-- Task List Filters -->
        <div class="filter-wrapper">
            <span id="task-count">0 tasks remaining</span>
        </div>

        <!-- Tasks List Container -->
        <ul id="todo-list">
            <!-- JavaScript dynamically inserts tasks here -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
